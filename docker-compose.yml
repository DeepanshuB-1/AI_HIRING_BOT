services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: hiringbot
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d hiringbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis is intentionally omitted — reuse the already-running container on localhost:6379

volumes:
  pgdata:
